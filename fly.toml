# fly.toml — https://fly.io/docs/reference/configuration/
#
# First-time setup:
#   fly auth login
#   fly apps create slack-in-your-time   # skip if the app already exists
#   fly secrets set SLACK_SIGNING_SECRET=... SLACK_CLIENT_ID=... SLACK_CLIENT_SECRET=...
#   fly secrets set GOOGLE_APPLICATION_CREDENTIALS=/secrets/firebase.json
#   fly secrets mount /secrets/firebase.json=@/path/to/service-account.json
#
# Deploy manually: fly deploy
# CI deploys automatically on push to master/main when FLY_API_TOKEN is configured.

app = 'slack-in-your-time'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
